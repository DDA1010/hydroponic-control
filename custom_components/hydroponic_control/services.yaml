run_pump:
  name: Run pump
  description: >-
    Run a single manual irrigation pulse. The dry-run / safety gate is still
    enforced, so the pump will not start if the reservoir is empty.
  target:
    entity:
      integration: hydroponic_control
      domain: switch
  fields:
    minutes:
      name: Minutes
      description: Pulse length in minutes. Defaults to the configured pump-on time.
      required: false
      example: 2
      selector:
        number:
          min: 0.1
          max: 1440
          step: 0.1
          unit_of_measurement: min
          mode: box

reset_alarms:
  name: Reset alarms
  description: >-
    Clear latched alarms (for example a pump fault) and attempt to resume the
    irrigation cycle.
  target:
    entity:
      integration: hydroponic_control
      domain: switch
